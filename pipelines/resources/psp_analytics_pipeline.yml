# =============================================================================
# PSP Analytics Pipeline - Unified Medallion Pipeline
# =============================================================================
#
# Single unified pipeline covering all 7 entities across Bronze, Silver L1, Silver L2, and Gold layers.
# DLT resolves execution order from the dependency graph automatically.
#
# Libraries: 7 bronze + 7 silver L1 SQL + 1 silver L1 Python + 4 silver L2 SQL + 3 gold = 22 notebooks
#
# =============================================================================

resources:
  pipelines:
    psp_analytics_pipeline:
      name: "psp-analytics-${bundle.target}"
      catalog: "${var.catalog}"
      target: "analytics"
      serverless: true
      channel: "CURRENT"
      edition: "ADVANCED"
      photon: true
      continuous: false

      # -----------------------------------------------------------------------
      # Libraries: All Bronze -> Silver -> Gold notebooks
      # DLT resolves execution order from the dependency graph automatically.
      # -----------------------------------------------------------------------
      libraries:
        # -- Bronze: Raw ingestion from landing zone (7 entities) --
        - notebook:
            path: ../src/psp-analytics/bronze/merchants.sql
        - notebook:
            path: ../src/psp-analytics/bronze/customers.sql
        - notebook:
            path: ../src/psp-analytics/bronze/payments.sql
        - notebook:
            path: ../src/psp-analytics/bronze/orders.sql
        - notebook:
            path: ../src/psp-analytics/bronze/transactions.sql
        - notebook:
            path: ../src/psp-analytics/bronze/payouts.sql
        - notebook:
            path: ../src/psp-analytics/bronze/disputes.sql

        # -- Silver L1: Cleaned, conformed, domain-aligned (7 entity tables) --
        - notebook:
            path: ../src/psp-analytics/silver/merchants.sql
        - notebook:
            path: ../src/psp-analytics/silver/customers.sql
        - notebook:
            path: ../src/psp-analytics/silver/payments.sql
        - notebook:
            path: ../src/psp-analytics/silver/orders.sql
        - notebook:
            path: ../src/psp-analytics/silver/transactions.sql
        - notebook:
            path: ../src/psp-analytics/silver/payouts.sql
        - notebook:
            path: ../src/psp-analytics/silver/disputes.sql
        - notebook:
            path: ../src/psp-analytics/silver/unified_transactions.py

        # -- Silver L2: Domain-scoped operational views (4 materialized views) --
        - notebook:
            path: ../src/psp-analytics/silver/l2_settlement_ops.sql
        - notebook:
            path: ../src/psp-analytics/silver/l2_customer_service.sql
        - notebook:
            path: ../src/psp-analytics/silver/l2_risk_operations.sql
        - notebook:
            path: ../src/psp-analytics/silver/l2_merchant_operations.sql

        # -- Gold: Business analytics (3 tables) --
        - notebook:
            path: ../src/psp-analytics/gold/merchant_performance.sql
        - notebook:
            path: ../src/psp-analytics/gold/customer_analytics.sql
        - notebook:
            path: ../src/psp-analytics/gold/risk_fraud_monitoring.sql

      # -----------------------------------------------------------------------
      # Configuration: Passed to pipeline as spark.conf accessible parameters
      # -----------------------------------------------------------------------
      configuration:
        landing_volume: "${var.landing_volume}"
        catalog: "${var.catalog}"
        "spark.databricks.delta.properties.defaults.delta.feature.timestampNtz": "supported"

      # -----------------------------------------------------------------------
      # Notifications: Pipeline failure alerting
      # -----------------------------------------------------------------------
      notifications:
        - email_recipients:
            - "psp-data-team@company.com"
          alerts:
            - on-update-failure
            - on-flow-failure
